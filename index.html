<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wake Up, Neo...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Consolas, "Courier New", monospace;
}

canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
}

.center{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:2;
    padding:20px;
}

.text{
    color:#00ff66;
    font-size:clamp(2rem,8vw,5.5rem);
    font-weight:bold;
    text-shadow:
        0 0 5px #00ff66,
        0 0 10px #00ff66,
        0 0 20px #00ff66,
        0 0 40px #00ff66;
    white-space:nowrap;
    overflow:hidden;
    border-right:.12em solid #00ff66;
    width:0;
    animation:
        typing 3.5s steps(16,end) forwards,
        blink .7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:16ch}
}

@keyframes blink{
    50%{border-color:transparent;}
}

.scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.03) 0px,
        rgba(255,255,255,.03) 2px,
        transparent 3px,
        transparent 5px
    );
    z-index:3;
    mix-blend-mode:overlay;
}

.glow{
    position:fixed;
    inset:0;
    background:radial-gradient(circle, transparent 45%, rgba(0,255,80,.08));
    pointer-events:none;
    z-index:1;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="glow"></div>

<div class="center">
    <div class="text">Wake Up, Neo...</div>
</div>

<div class="scanlines"></div>

<script>
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    cols=Math.floor(canvas.width/fontSize);
    drops=new Array(cols).fill(1);
}

const letters="アァカサタナハマヤャラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
const fontSize=18;

let cols;
let drops;

resize();

function draw(){

    ctx.fillStyle="rgba(0,0,0,0.06)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff66";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){

        const text=letters[Math.floor(Math.random()*letters.length)];

        ctx.fillText(
            text,
            i*fontSize,
            drops[i]*fontSize
        );

        if(
            drops[i]*fontSize>canvas.height &&
            Math.random()>0.975
        ){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(draw,35);

window.addEventListener("resize",resize);
</script>

</body>
</html>
